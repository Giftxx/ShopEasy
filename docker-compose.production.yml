# Production overrides — usage: docker compose -f docker-compose.yml -f docker-compose.production.yml up -d
services:
  backend:
    restart: always
    environment:
      APP_ENV: production
      DATABASE_URL: "${DATABASE_URL}"
      REDIS_HOST: "${REDIS_HOST:-redis}"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"
      SECRET_KEY: "${SECRET_KEY}"
      SHOPIFY_API_KEY: "${SHOPIFY_API_KEY}"
      SHOPIFY_API_SECRET: "${SHOPIFY_API_SECRET}"
      SHOPIFY_WEBHOOK_SECRET: "${SHOPIFY_WEBHOOK_SECRET}"
      SHOPIFY_STORE_URL: "${SHOPIFY_STORE_URL}"
      QDRANT_HOST: "${QDRANT_HOST:-qdrant}"
    command: >
      python -m uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --workers 4
    volumes: []

  frontend:
    build:
      context: ./frontend
      target: production
    restart: always
    environment:
      NODE_ENV: production
    volumes: []

  db:
    restart: always

  redis:
    restart: always

  minio:
    restart: always

  qdrant:
    restart: always
